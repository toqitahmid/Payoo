<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home Page</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- daisy CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- font awesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- velnila css  -->
    <style>
        * {
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-screen-md bg-base-200 mx-auto">

    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-2">
                <div class="logo w-[70px]">
                    <img src="assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-2xl font-bold">$ <span id="balance" vaule="45000">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div>
                <a href="/indext.html" class="btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Logout</a>
            </div>
        </section>
    </header>

    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-3xl font-bold">
            Welcome to Pay<span class="text-primary">oo</span>
        </h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>

        <div class="buttons grid grid-cols-3 gap-4">

            <button onclick="showOnly('add-money')" class="btn h-full py-4 btn-primary btn-soft flex-col">
                <img src="assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="showOnly('cash-out')" class="btn h-full py-4 btn-primary btn-soft flex-col">
                <img src="assets/opt-2.png" alt="">
                <p>Cash Out</p>
            </button>
            <button class="btn h-full py-4 btn-primary btn-soft flex-col">
                <img src="assets/opt-3.png" alt="">
                <p>Transfer Money</p>
            </button>
            <button class="btn h-full py-4 btn-primary btn-soft flex-col">
                <img src="assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn h-full py-4 btn-primary btn-soft flex-col">
                <img src="assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button onclick="showOnly('transaction-history')" class="btn h-full py-4 btn-primary btn-soft flex-col">
                <img src="assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>

    <section id="add-money" class="w-11/12 mx-auto py-10 space-y-5 hidden">

        <h2 class="text-2xl font-bold">Add Money</h2>
        <div class="form pt-15">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <h1 class="font-bold"></h1>
                        <label class="text-neutral font-bold">Select A Bank</label>
                        <select id="add-money-bank" class="select rounded-full bg-base-200" placeholder="Select a bank">
                            <option disabled selected>Select bank</option>
                            <option value="bb">Bangladesh Bank</option>
                            <option value="ib">Islami Bank</option>
                            <option value="sb">Sonali Bank</option>
                            <option value="mb">Markentaile Bank</option>
                            <option value="rb">Rupali Bank</option>
                            <option value="exb">Exim Bank</option>
                        </select>
                        <label class="label text-neutral font-bold mt-2">Bank Account Number</label>
                        <input id="account-number" type="number" class="input rounded-full bg-base-200"
                            placeholder="Enter 11 digit account number" />
                        <label for="amount" class="font-bold mt-2">Amount to Add</label>
                        <input type="number" id="amountAdd" class="input rounded-full bg-base-200"
                            placeholder="Add amount to withdraw">
                        <label class="label text-neutral font-bold mt-2">Pin Number</label>
                        <input id="addMoney-pin-number" type="password" class="input rounded-full bg-base-200"
                            placeholder="Enter pin number" />
                        <button id="addMoney-btn" class="login-btn btn btn-primary rounded-3xl mt-4">Add Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    <section id="cash-out" class="w-11/12 mx-auto py-10 space-y-5 hidden">

        <h2 class="text-2xl font-bold">Cash Out</h2>
        <div class="form pt-15">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral font-bold mt-2">Agent Number</label>
                        <input id="agent-number" type="phone-number" class="input rounded-full bg-base-200"
                            placeholder="Enter agent number" />
                        <label for="amount" class="font-bold mt-2">Amount</label>
                        <input type="number" id="amount" class="input rounded-full bg-base-200"
                            placeholder="Enter your amount">
                        <label class="label text-neutral font-bold mt-2">Pin Number</label>
                        <input id="cashOut-pin-number" type="password" class="input rounded-full bg-base-200"
                            placeholder="Enter pin number" />
                        <button id="withdraw-btn" class="login-btn btn btn-primary rounded-3xl mt-4">Withdraw
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    <section id="transaction-history" class="w-11/12 mx-auto py-10 space-y-5 hidden">
        <h2 class="text-2xl font-bold">Transactions</h2>
        
        <div id="transaction-cards" >
        </div>
    </section>
    <script src="js/mechine.js"></script>
    <script src="js/cashout.js"></script>
    <script src="js/addMoney.js"></script>
    <script src="js/transactions.js"></script>
</body> 

</html>
