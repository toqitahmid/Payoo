<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- daisy CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- font awesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- velnila css  -->
    <style>
        * {
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>

<body>
    <main class="min-h-screen max-w-md bg-base-200 mx-auto">
        <div class="logo w-[200px] mx-auto pt-42">
            <img src="./assets/Logo-full.png" alt="">
        </div>
        <div class="form pt-15">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral font-bold">Mobile Number</label>
                        <input id="phn-no" type="phone-number" maxlength="11" minlength="11"
                            class="input rounded-full bg-base-200" placeholder="Enter your mobile number" />
                        <label class="label text-neutral font-bold">Password</label>
                        <input id="input-password" type="password" class="input rounded-full bg-base-200"
                            placeholder="Password" />
                        <div><a class="link link-hover font-bold">Forgot password?</a></div>
                        <button id="login-btn" class="login-btn btn btn-neutral mt-4">Login</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </main>
    <script src="js/login.js"></script>
</body>

</html>
